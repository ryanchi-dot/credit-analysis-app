services:
  - type: web
    name: credit-analysis-app
    runtime: docker
    dockerContext: ./web_app
    dockerfilePath: ./web_app/Dockerfile
    plan: free
    region: oregon
    branch: main
    numInstances: 1
    healthCheckPath: /_stcore/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: AGENT_API_URL
        # 请在Render平台上手动设置，格式：https://你的coze-bot-url/stream_run
        sync: false
      - key: AGENT_API_KEY
        sync: false
      - key: AGENT_PROJECT_ID
        # 请在Render平台上手动设置，值为Coze Bot的项目ID（如：7606922958543568936）
        sync: false
